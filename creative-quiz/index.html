<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Co 51 Quiz</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="floating">
    <img src="assets/HC51circelblue.png" class="float blue" alt="">
    <img src="assets/HC51circlegreen.png" class="float green" alt="">
    <img src="assets/HC51dots.png" class="float dots" alt="">
    <img src="assets/HC51orangeslash.png" class="float slash" alt="">
  </div>

  <main class="container">
    <img
      class="logo"
      src="https://hotelco51.com/wp-content/uploads/2024/08/cropped-Hotel_Co_51.png"
      alt="Hotel Co 51"
    >

    <h2 class="subtitle">Hotel Co 51 Quiz</h2>
    <h1 class="title">Let's Get Quizzical</h1>

    <div class="card">
      <form id="loginForm">
        <label>Full Name</label>
        <input type="text" required>

        <label>Email</label>
        <input type="email" required>

        <button class="startBtn">Start Quiz</button>
      </form>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
